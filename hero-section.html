<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSAR - Apresentação</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #1a6b2f; }
        .page {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            display: block;
        }
        .page img {
            width: 100%;
            height: auto;
            display: block;
        }
        .cta {
            background: #1a6b2f;
            padding: 32px 24px;
            text-align: center;
        }
        .cta a {
            display: inline-block;
            background: #f5c518;
            color: #1a6b2f;
            font-family: 'Sora', sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 8px;
            text-decoration: none;
        }
        .cta a:hover {
            background: #e6b800;
        }
    </style>
</head>
<body>
    <div class="page">
        <img 
            src="assets/apresentacao-sysar.jpg" 
            alt="SYSAR - Apresentação completa"
        >
        <div class="cta">
            <a href="index.html#formOrcamento">Solicitar orçamento</a>
        </div>
    </div>
</body>
</html>
