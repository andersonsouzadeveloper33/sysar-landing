<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#028758">
    <title>SYSAR - Apresentação</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #028758; }
        .page {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            display: block;
        }
        .page img {
            width: 100%;
            height: auto;
            display: block;
        }
        .cta {
            background: #028758;
            padding: 24px;
            text-align: center;
        }
        .cta a {
            display: inline-block;
            background: #ffffff;
            color: #028758;
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
        }
        .cta a:hover {
            background: #f0f0f0;
        }

        .nav-top {
            background: #028758;
            padding: 20px 24px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .back-link {
            display: inline-block;
            background: #ffffff;
            color: #028758;
            text-decoration: none;
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 32px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-link:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="nav-top">
            <a href="index.html" class="back-link">← Voltar ao menu</a>
        </div>
        <img 
            src="assets/apresentacao-sysar.jpg" 
            alt="SYSAR - Apresentação completa"
        >
        <div class="cta">
            <a href="index.html#formOrcamento">← Voltar ao menu</a>
        </div>
    </div>
</body>
</html>
